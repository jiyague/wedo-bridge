<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WeDo Web Control v1.4</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        .btn { padding: 20px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; }
        #log { margin-top: 20px; font-size: 14px; background: #fff; padding: 15px; border: 1px solid #ccc; height: 150px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <h1>WeDo Web Control v1.4</h1>
    <button id="connectBtn" class="btn" style="background:#007bff; color:white;">1. CONECTAR Y VALIDAR</button>
    <div id="controls" style="display:none;">
        <button id="motorCW" class="btn" style="background:#ffc107;">2. GIRAR MOTOR</button>
    </div>
    <div id="log">Estado: Esperando...</div>

    <script>
        let motorChar;
        const SERVICE_UUID = '00001523-1212-efde-1523-785feabcd123';

        document.getElementById('connectBtn').addEventListener('click', async () => {
            const logEl = document.getElementById('log');
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const chars = await service.getCharacteristics();
                
                motorChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                const notifyChar = chars.find(c => c.properties.notify);

                // IMPORTANTE: Nos suscribimos a las notificaciones para que el Hub
                // deje de bloquearnos y nos "acepte" como un cliente válido.
                if (notifyChar) {
                    await notifyChar.startNotifications();
                    notifyChar.addEventListener('characteristicvaluechanged', (event) => {
                        logEl.innerText = "Hub dice: ¡Hola! Conexión validada.";
                    });
                }
                
                document.getElementById('controls').style.display = 'block';
                logEl.innerText = "¡Conectado y validado!";
            } catch (e) { logEl.innerText = "Error: " + e; }
        });

        document.getElementById('motorCW').onclick = async () => {
            // Este es el comando estándar de inicio de motor LWP
            await motorChar.writeValue(new Uint8Array([0x06, 0x00, 0x01, 0x01, 0x01, 0x32]));
            document.getElementById('log').innerText = "Comando enviado.";
        };
    </script>
</body>
</html>
