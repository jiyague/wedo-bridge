<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧱 WeDo Blocks</title>

  <script src="https://unpkg.com/blockly@9.3.3/blockly_compressed.js"></script>
  <script src="https://unpkg.com/blockly@9.3.3/blocks_compressed.js"></script>
  <script src="https://unpkg.com/blockly@9.3.3/javascript_compressed.js"></script>
  <script src="https://unpkg.com/blockly@9.3.3/msg/es.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
      background: #1a1a2e; color: white;
    }

    /* ── Barra Superior ── */
    #topbar {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 8px 14px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 3px solid #4a90d9;
      flex-wrap: wrap; min-height: 60px;
    }
    .logo { font-size: 20px; font-weight: 900; color: #4a90d9; white-space: nowrap; }
    .author {
      font-size: 11px; color: #6a8ab8; white-space: nowrap;
      align-self: flex-end; padding-bottom: 2px; margin-left: -4px;
    }

    .btn {
      padding: 7px 15px; border: none; border-radius: 20px;
      font-size: 14px; font-weight: bold; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.15); }
    .btn:active:not(:disabled) { transform: scale(0.95); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #connectBtn { background: #28a745; color: white; font-size: 15px; padding: 9px 20px; }
    #connectBtn.connected { background: #17a2b8; }

    .round-btn {
      width: 46px; height: 46px; border-radius: 50% !important;
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      padding: 0 !important;
    }
    #playBtn  { background: #4caf50; color: white; }
    #playBtn.running { background: #ff9800; }
    #stopBtn  { background: #e53935; color: white; }

    .divider { width: 1px; height: 38px; background: #3a3a5a; flex-shrink: 0; }

    /* Puertos auto-detectados */
    .port-status {
      display: flex; flex-direction: column; gap: 3px;
      background: rgba(255,255,255,0.07);
      padding: 5px 11px; border-radius: 10px; font-size: 12px;
    }
    .port-status .port-row { display: flex; align-items: center; gap: 5px; color: #aaa; }
    .port-status .port-val { font-weight: bold; color: #7ecfff; }

    .sensor-pill {
      background: rgba(255,255,255,0.07);
      padding: 4px 12px; border-radius: 10px;
      font-size: 11px; color: #aaa; text-align: center; min-width: 88px;
    }
    .sensor-pill .val {
      display: block; font-size: 17px; font-weight: bold;
      color: #ffd700; line-height: 1.3;
    }

    #statusBar {
      font-size: 12px; color: #888;
      background: rgba(255,255,255,0.05);
      padding: 4px 10px; border-radius: 8px;
      max-width: 220px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      margin-left: auto;
    }
    #statusBar.ok   { color: #4caf50; }
    #statusBar.err  { color: #e53935; }
    #statusBar.warn { color: #ff9800; }

    /* ── Área principal ── */
    #main { flex: 1; display: flex; overflow: hidden; }
    #blocklyDiv { flex: 1; height: 100%; }

    /* ── Contenedor lateral: botón + panel (flex row) ──
       La clave del fix: botón y panel son hermanos en flex,
       el botón siempre es visible y el panel se expande a su derecha. */
    #sideContainer {
      display: flex;
      flex-direction: row;
      flex-shrink: 0;
    }

    #logToggleBtn {
      width: 20px;
      background: #2a2a4a;
      border: none;
      border-left: 2px solid #3a3a5a;
      cursor: pointer;
      color: #8ab4d4;
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
      padding: 0;
    }
    #logToggleBtn:hover { background: #3a3a6a; color: white; }

    #logPanel {
      width: 210px;
      background: #0d0d1a;
      border-left: 2px solid #2a2a4a;
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease;
    }
    /* Oculto por defecto */
    #logPanel.hidden { width: 0; border-left: none; }

    #logHeader {
      padding: 7px 10px; background: #12122a;
      border-bottom: 1px solid #2a2a4a;
      display: flex; justify-content: space-between; align-items: center;
      white-space: nowrap; min-width: 210px;
    }
    #logHeader span { font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; }
    #clearLogBtn {
      background: #2a2a4a; color: #888; border: none;
      padding: 2px 8px; border-radius: 5px; cursor: pointer; font-size: 11px;
    }
    #logContent {
      flex: 1; overflow-y: auto; padding: 6px;
      font-family: monospace; font-size: 11px;
      min-width: 210px;
    }
    #logContent .e {
      padding: 2px 4px; border-radius: 3px;
      margin-bottom: 2px; word-break: break-all; color: #6af;
    }
    #logContent .e.ok   { color: #4caf50; }
    #logContent .e.err  { color: #f66; }
    #logContent .e.cmd  { color: #ffd700; }
    #logContent .e.info { color: #aaa; }
  </style>
</head>
<body>

<!-- ── Barra superior ── -->
<div id="topbar">
  <div class="logo">🧱 WeDo Blocks</div>
  <div class="author">by Jose I. Yagüe</div>

  <button class="btn" id="connectBtn" onclick="connectHub()">🔵 Conectar Hub</button>

  <div class="divider"></div>

  <!-- Puertos detectados automáticamente -->
  <div class="port-status">
    <div class="port-row">Puerto 1: <span class="port-val" id="port1Label">— vacío</span></div>
    <div class="port-row">Puerto 2: <span class="port-val" id="port2Label">— vacío</span></div>
  </div>

  <div class="divider"></div>

  <div class="sensor-pill">
    📏 Movimiento
    <span class="val" id="motionVal">--</span>
  </div>
  <div class="sensor-pill">
    📐 Inclinación
    <span class="val" id="tiltVal">--</span>
  </div>

  <div class="divider"></div>

  <button class="btn round-btn" id="playBtn"  onclick="runProgram()"  title="Ejecutar">▶</button>
  <button class="btn round-btn" id="stopBtn"  onclick="stopProgram()" title="Parar">⏹</button>

  <div id="statusBar">Desconectado</div>
</div>

<!-- ── Zona de trabajo ── -->
<div id="main">
  <div id="blocklyDiv"></div>

  <!-- FIX toggle: botón y panel son hermanos en flex row,
       el botón siempre visible, el panel se expande a su derecha -->
  <div id="sideContainer">
    <button id="logToggleBtn" onclick="toggleLog()" title="Mostrar registro">◀</button>
    <div id="logPanel" class="hidden">
      <div id="logHeader">
        <span>📋 Registro</span>
        <button id="clearLogBtn" onclick="clearLog()">Borrar</button>
      </div>
      <div id="logContent"></div>
    </div>
  </div>
</div>

<!-- ── Toolbox ── -->
<xml id="toolbox" style="display:none">
  <category name="🚩 Eventos" colour="#E6821E">
    <block type="wedo_when_flag"></block>
  </category>
  <sep></sep>
  <category name="⚙️ Motor" colour="#4C97FF">
    <block type="wedo_motor_on">
      <value name="SPEED"><block type="math_number"><field name="NUM">3</field></block></value>
    </block>
    <block type="wedo_motor_off"></block>
    <block type="wedo_motor_time">
      <value name="SPEED"><block type="math_number"><field name="NUM">3</field></block></value>
      <value name="TIME"><block type="math_number"><field name="NUM">2</field></block></value>
    </block>
  </category>
  <category name="💡 LED" colour="#9966FF">
    <block type="wedo_led"></block>
  </category>
  <category name="📡 Sensores" colour="#5CB1D6">
    <block type="wedo_sensor_motion"></block>
    <block type="wedo_sensor_tilt_val"></block>
    <block type="wedo_sensor_tilt_bool"></block>
  </category>
  <sep></sep>
  <category name="🔁 Control" colour="#FFAB19">
    <block type="wedo_wait">
      <value name="TIME"><block type="math_number"><field name="NUM">1</field></block></value>
    </block>
    <block type="wedo_repeat">
      <value name="TIMES"><block type="math_number"><field name="NUM">10</field></block></value>
    </block>
    <block type="wedo_forever"></block>
    <block type="wedo_wait_until">
      <value name="COND"><block type="logic_boolean"><field name="BOOL">TRUE</field></block></value>
    </block>
    <block type="controls_if"></block>
    <block type="controls_if"><mutation else="1"></mutation></block>
  </category>
  <category name="🔢 Operadores" colour="#59C059">
    <block type="logic_compare"><field name="OP">GT</field></block>
    <block type="logic_compare"><field name="OP">LT</field></block>
    <block type="logic_compare"><field name="OP">EQ</field></block>
    <block type="logic_operation"><field name="OP">AND</field></block>
    <block type="logic_operation"><field name="OP">OR</field></block>
    <block type="logic_negate"></block>
    <block type="math_number"></block>
    <block type="math_random_int">
      <value name="FROM"><block type="math_number"><field name="NUM">1</field></block></value>
      <value name="TO"><block type="math_number"><field name="NUM">10</field></block></value>
    </block>
  </category>
</xml>

<script>
'use strict';

// ══════════════════════════════════════════════════════
//  WeDo 2.0 — Protocolo BLE
// ══════════════════════════════════════════════════════

const UUID = {
  HUB_SERVICE:  '00001523-1212-efde-1523-785feabcd123',
  IO_SERVICE:   '00004f0e-1212-efde-1523-785feabcd123',
  OUTPUT_CMD:   '00001565-1212-efde-1523-785feabcd123',
  INPUT_CMD:    '00001563-1212-efde-1523-785feabcd123',
  SENSOR_VALUE: '00001560-1212-efde-1523-785feabcd123',
  PORT_TYPE:    '00001527-1212-efde-1523-785feabcd123',
};

// Velocidades nivel 1–5: byte BLE para ↻ horario y ↺ antihorario
const SPD_CW  = [0, 0x20, 0x35, 0x50, 0x65, 0x7e];
const SPD_CCW = [0, 0xe0, 0xcb, 0xb0, 0x9b, 0x82];

const LED_COLORS = {
  apagado: 0, rosa: 1, violeta: 2, azul: 3,
  cian: 4, verde: 5, amarillo: 6, naranja: 7, rojo: 8, blanco: 9
};

let bleDevice   = null;
let outputChar  = null;
let inputChar   = null;
let sensorChar  = null;
let isConnected = false;

// Puerto detectado automáticamente para cada tipo de dispositivo
const detectedPorts = { motor: null, tilt: null, motion: null };
// canal → tipo ('motor' | 'tilt' | 'motion')
const portCfg = {};

const sensorData = { motion: 0, tilt: 0 };

// ── Conectar Hub ─────────────────────────────────────

async function connectHub() {
  try {
    setStatus('Buscando hub...', '');
    const dev = await navigator.bluetooth.requestDevice({
      filters: [{ services: [UUID.HUB_SERVICE] }],
      optionalServices: [UUID.IO_SERVICE]
    });

    setStatus('Conectando...', '');
    bleDevice = dev;
    const server = await dev.gatt.connect();
    log('✅ GATT conectado', 'ok');

    // Servicio I/O (motor + sensores)
    const ioSvc = await server.getPrimaryService(UUID.IO_SERVICE);
    outputChar  = await ioSvc.getCharacteristic(UUID.OUTPUT_CMD);
    inputChar   = await ioSvc.getCharacteristic(UUID.INPUT_CMD);
    sensorChar  = await ioSvc.getCharacteristic(UUID.SENSOR_VALUE);

    await sensorChar.startNotifications();
    sensorChar.addEventListener('characteristicvaluechanged', onSensorValue);
    log('📡 Sensor value notifications activadas', 'ok');

    // Servicio Hub (detección automática de puertos)
    const hubSvc = await server.getPrimaryService(UUID.HUB_SERVICE);
    const ptChar = await hubSvc.getCharacteristic(UUID.PORT_TYPE);
    await ptChar.startNotifications();
    ptChar.addEventListener('characteristicvaluechanged', onPortType);
    log('🔌 Port type notifications activadas', 'ok');
    log('⏳ Detectando dispositivos conectados...', 'info');

    isConnected = true;
    const btn = document.getElementById('connectBtn');
    btn.textContent = '✅ ' + (dev.name || 'Hub conectado');
    btn.classList.add('connected');
    setStatus('Conectado: ' + (dev.name || 'WeDo Hub'), 'ok');
    dev.addEventListener('gattserverdisconnected', onDisconnect);

  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
    log('❌ ' + e, 'err');
  }
}

function onDisconnect() {
  isConnected = false;
  outputChar = inputChar = sensorChar = null;
  detectedPorts.motor = detectedPorts.tilt = detectedPorts.motion = null;
  for (const k of Object.keys(portCfg)) delete portCfg[k];
  updatePortDisplay();
  const btn = document.getElementById('connectBtn');
  btn.textContent = '🔵 Conectar Hub';
  btn.classList.remove('connected');
  setStatus('Desconectado', 'err');
  log('❌ Hub desconectado', 'err');
}

// ── Detección automática de puertos ─────────────────
// El hub envía notificaciones PORT_TYPE al conectar con el estado
// actual de cada puerto, y después al enchufar/desenchufar algo.

async function onPortType(e) {
  const d = new Uint8Array(e.target.value.buffer);
  if (d.length < 2) return;
  const ch    = d[0];
  const added = d[1] === 1;

  if (!added) {
    // Dispositivo desconectado de este puerto
    for (const key of Object.keys(detectedPorts)) {
      if (detectedPorts[key] === ch) detectedPorts[key] = null;
    }
    portCfg[ch] = null;
    updatePortDisplay();
    log(`🔌 Puerto ${ch}: desconectado`, 'info');
    return;
  }

  if (d.length < 4) return;
  const typeId = d[3];

  if (typeId === 0x01) {
    detectedPorts.motor = ch;
    portCfg[ch] = 'motor';
    log(`🔌 Puerto ${ch}: ⚙️ Motor detectado`, 'ok');

  } else if (typeId === 0x22) {
    detectedPorts.tilt = ch;
    portCfg[ch] = 'tilt';
    log(`🔌 Puerto ${ch}: 📐 Sensor inclinación detectado`, 'ok');
    await configureSensor(ch, typeId);

  } else if (typeId === 0x23) {
    detectedPorts.motion = ch;
    portCfg[ch] = 'motion';
    log(`🔌 Puerto ${ch}: 📏 Sensor movimiento detectado`, 'ok');
    await configureSensor(ch, typeId);

  } else {
    log(`🔌 Puerto ${ch}: dispositivo desconocido (tipo 0x${typeId.toString(16)})`, 'info');
  }

  updatePortDisplay();
}

function updatePortDisplay() {
  const labels = { motor: '⚙️ Motor', tilt: '📐 Inclinación', motion: '📏 Movimiento' };
  for (const p of [1, 2]) {
    const el = document.getElementById(`port${p}Label`);
    if (el) el.textContent = labels[portCfg[p]] || '— vacío';
  }
}

async function configureSensor(ch, deviceType) {
  if (!inputChar) return;
  try {
    await inputChar.writeValueWithResponse(
      new Uint8Array([0x01, 0x02, ch, deviceType, 0x00, 0x01, 0x00, 0x00, 0x00, 0x02, 0x01])
    );
    await inputChar.writeValueWithResponse(new Uint8Array([0x00, 0x01, ch]));
    log(`⚙️ Sensor puerto ${ch} configurado`, 'ok');
  } catch (err) {
    log(`⚠️ Error configurando sensor ${ch}: ` + err.message, 'err');
  }
}

// ── Lectura de sensores ──────────────────────────────

function onSensorValue(e) {
  const d   = new Uint8Array(e.target.value.buffer);
  if (d.length < 6) return;
  const ch  = d[1];
  const dv  = new DataView(e.target.value.buffer);
  const val = dv.getFloat32(2, true);
  const type = portCfg[ch];

  if (type === 'motion') {
    sensorData.motion = Math.round(val * 10) / 10;
    document.getElementById('motionVal').textContent = sensorData.motion;
  } else if (type === 'tilt') {
    sensorData.tilt = Math.round(val);
    const nombres = ['plano', 'atrás', 'adelante', 'derecha', 'izquierda', '?'];
    document.getElementById('tiltVal').textContent = nombres[sensorData.tilt] ?? sensorData.tilt;
  }
}

// ── Comandos de motor (sin puerto: auto-detectado) ───

async function motorOn(direction, speed) {
  if (!outputChar)              { log('⚠️ Hub no conectado', 'err'); return; }
  if (detectedPorts.motor === null) { log('⚠️ Motor no detectado. ¿Está conectado al hub?', 'err'); return; }
  speed = Math.max(1, Math.min(5, Math.round(speed)));
  const speedByte = direction === 'cw' ? SPD_CW[speed] : SPD_CCW[speed];
  await outputChar.writeValueWithResponse(
    new Uint8Array([detectedPorts.motor, 0x01, 0x01, speedByte])
  );
  log(`⚙️ Motor ${direction === 'cw' ? '↻' : '↺'} vel.${speed}`, 'cmd');
}

async function motorOff() {
  if (!outputChar || detectedPorts.motor === null) return;
  await outputChar.writeValueWithResponse(
    new Uint8Array([detectedPorts.motor, 0x01, 0x01, 0x7f])
  );
  log('⏹ Motor parado', 'cmd');
}

async function setLed(colorName) {
  if (!outputChar) return;
  const idx = LED_COLORS[colorName] ?? 3;
  await outputChar.writeValueWithResponse(new Uint8Array([0x06, 0x04, 0x01, idx]));
  log(`💡 LED → ${colorName}`, 'cmd');
}

// ── Helpers para código generado ─────────────────────

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function waitUntil(condFn, timeoutMs = 60000) {
  const t0 = Date.now();
  while (isRunning && (Date.now() - t0) < timeoutMs) {
    if (condFn()) return;
    await sleep(50);
  }
}

// ══════════════════════════════════════════════════════
//  BLOCKLY — Bloques personalizados
// ══════════════════════════════════════════════════════

const JS = Blockly.JavaScript;

// ── 🚩 Bandera verde ──────────────────────────────────
Blockly.Blocks['wedo_when_flag'] = {
  init() {
    this.appendDummyInput().appendField('▶  Al pulsar PLAY');
    this.setNextStatement(true, null);
    this.setColour('#E6821E');
    this.setTooltip('El programa empieza aquí al pulsar ▶');
  }
};
JS['wedo_when_flag'] = () => '';

// ── ⚙️ Encender motor (se queda encendido) ───────────
Blockly.Blocks['wedo_motor_on'] = {
  init() {
    this.appendDummyInput()
      .appendField('⚙️ encender motor')
      .appendField(new Blockly.FieldDropdown([
        ['↻ horario',     'cw'],
        ['↺ antihorario', 'ccw']
      ]), 'DIR');
    this.appendValueInput('SPEED').setCheck('Number').appendField('velocidad');
    this.appendDummyInput().appendField('(1–5)');
    this.setInputsInline(true);
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour('#4C97FF');
    this.setTooltip('Enciende el motor y lo deja girando hasta que uses "apagar motor".');
  }
};
JS['wedo_motor_on'] = b => {
  const dir   = b.getFieldValue('DIR');
  const speed = JS.valueToCode(b, 'SPEED', JS.ORDER_ATOMIC) || '3';
  return `await motorOn('${dir}', ${speed});\n`;
};

// ── ⏹ Apagar motor ───────────────────────────────────
Blockly.Blocks['wedo_motor_off'] = {
  init() {
    this.appendDummyInput().appendField('⏹ apagar motor');
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour('#4C97FF');
    this.setTooltip('Para el motor completamente');
  }
};
JS['wedo_motor_off'] = () => `await motorOff();\n`;

// ── ⚙️ Mover durante X segundos ──────────────────────
Blockly.Blocks['wedo_motor_time'] = {
  init() {
    this.appendDummyInput()
      .appendField('⚙️ mover motor')
      .appendField(new Blockly.FieldDropdown([
        ['↻ horario',     'cw'],
        ['↺ antihorario', 'ccw']
      ]), 'DIR');
    this.appendValueInput('SPEED').setCheck('Number').appendField('velocidad');
    this.appendValueInput('TIME').setCheck('Number').appendField('durante');
    this.appendDummyInput().appendField('segundos');
    this.setInputsInline(true);
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour('#4C97FF');
    this.setTooltip('Mueve el motor el tiempo indicado y lo para automáticamente');
  }
};
JS['wedo_motor_time'] = b => {
  const dir   = b.getFieldValue('DIR');
  const speed = JS.valueToCode(b, 'SPEED', JS.ORDER_ATOMIC) || '3';
  const time  = JS.valueToCode(b, 'TIME',  JS.ORDER_ATOMIC) || '1';
  return `await motorOn('${dir}', ${speed});\nawait sleep(${time}*1000);\nawait motorOff();\n`;
};

// ── 💡 LED ────────────────────────────────────────────
Blockly.Blocks['wedo_led'] = {
  init() {
    this.appendDummyInput()
      .appendField('💡 LED de color')
      .appendField(new Blockly.FieldDropdown([
        ['🔵 azul','azul'],     ['🟢 verde','verde'],    ['🔴 rojo','rojo'],
        ['🟡 amarillo','amarillo'], ['🟠 naranja','naranja'], ['🟣 violeta','violeta'],
        ['🩷 rosa','rosa'],     ['🩵 cian','cian'],      ['⚪ blanco','blanco'], ['⚫ apagado','apagado'],
      ]), 'COLOR');
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour('#9966FF');
    this.setTooltip('Cambia el color de la luz del hub');
  }
};
JS['wedo_led'] = b => `await setLed('${b.getFieldValue('COLOR')}');\n`;

// ── 📏 Sensor movimiento (valor) ──────────────────────
Blockly.Blocks['wedo_sensor_motion'] = {
  init() {
    this.appendDummyInput().appendField('📏 distancia');
    this.setOutput(true, 'Number');
    this.setColour('#5CB1D6');
    this.setTooltip('Distancia medida por el sensor de movimiento');
  }
};
JS['wedo_sensor_motion'] = () => ['sensorData.motion', JS.ORDER_MEMBER];

// ── 📐 Inclinación (valor numérico) ───────────────────
Blockly.Blocks['wedo_sensor_tilt_val'] = {
  init() {
    this.appendDummyInput().appendField('📐 valor inclinación');
    this.setOutput(true, 'Number');
    this.setColour('#5CB1D6');
    this.setTooltip('0=plano, 1=atrás, 2=adelante, 3=derecha, 4=izquierda');
  }
};
JS['wedo_sensor_tilt_val'] = () => ['sensorData.tilt', JS.ORDER_MEMBER];

// ── 📐 Inclinación (booleano) ─────────────────────────
Blockly.Blocks['wedo_sensor_tilt_bool'] = {
  init() {
    this.appendDummyInput()
      .appendField('📐 ¿inclinado')
      .appendField(new Blockly.FieldDropdown([
        ['en cualquier dirección', 'any'],
        ['hacia adelante',  '2'],
        ['hacia atrás',     '1'],
        ['a la derecha',    '3'],
        ['a la izquierda',  '4'],
        ['plano',           '0'],
      ]), 'DIR')
      .appendField('?');
    this.setOutput(true, 'Boolean');
    this.setColour('#5CB1D6');
    this.setTooltip('Verdadero si el sensor tiene esa inclinación ahora mismo');
  }
};
JS['wedo_sensor_tilt_bool'] = b => {
  const dir  = b.getFieldValue('DIR');
  const expr = dir === 'any' ? 'sensorData.tilt !== 0' : `sensorData.tilt === ${dir}`;
  return [expr, JS.ORDER_EQUALITY];
};

// ── ⏱ Esperar N segundos ─────────────────────────────
Blockly.Blocks['wedo_wait'] = {
  init() {
    this.appendValueInput('TIME').setCheck('Number').appendField('⏱ esperar');
    this.appendDummyInput().appendField('segundos');
    this.setInputsInline(true);
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour('#FFAB19');
    this.setTooltip('Espera los segundos indicados antes de continuar');
  }
};
JS['wedo_wait'] = b => {
  const t = JS.valueToCode(b, 'TIME', JS.ORDER_ATOMIC) || '1';
  return `await sleep(${t}*1000);\n`;
};

// ── 🔢 Repetir N veces ────────────────────────────────
Blockly.Blocks['wedo_repeat'] = {
  init() {
    this.appendValueInput('TIMES').setCheck('Number').appendField('🔢 repetir');
    this.appendDummyInput().appendField('veces');
    this.appendStatementInput('DO').setCheck(null).appendField('hacer');
    this.setInputsInline(true);
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour('#FFAB19');
    this.setTooltip('Repite los bloques el número de veces indicado');
  }
};
JS['wedo_repeat'] = b => {
  const n    = JS.valueToCode(b, 'TIMES', JS.ORDER_ASSIGNMENT) || '0';
  const body = JS.statementToCode(b, 'DO') || 'await sleep(50);\n';
  return `for (let _i=0; _i<${n} && isRunning; _i++) {\n${body}}\n`;
};

// ── 🔁 Por siempre ────────────────────────────────────
Blockly.Blocks['wedo_forever'] = {
  init() {
    this.appendDummyInput().appendField('🔁 por siempre');
    this.appendStatementInput('DO').setCheck(null).appendField('hacer');
    this.setPreviousStatement(true, null);
    this.setColour('#FFAB19');
    this.setTooltip('Repite sin parar hasta que pulses ⏹');
  }
};
JS['wedo_forever'] = b => {
  const body = JS.statementToCode(b, 'DO') || 'await sleep(100);\n';
  return `while (isRunning) {\n${body}await sleep(20);\n}\n`;
};

// ── ⏳ Esperar hasta que ───────────────────────────────
Blockly.Blocks['wedo_wait_until'] = {
  init() {
    this.appendValueInput('COND').setCheck('Boolean').appendField('⏳ esperar hasta que');
    this.setInputsInline(true);
    this.setPreviousStatement(true, null);
    this.setNextStatement(true, null);
    this.setColour('#FFAB19');
    this.setTooltip('Espera hasta que la condición sea verdadera (máx. 60 seg)');
  }
};
JS['wedo_wait_until'] = b => {
  const cond = JS.valueToCode(b, 'COND', JS.ORDER_NONE) || 'true';
  return `await waitUntil(()=>(${cond}));\n`;
};

// ══════════════════════════════════════════════════════
//  MOTOR DE EJECUCIÓN
// ══════════════════════════════════════════════════════

let isRunning = false;

async function runProgram() {
  if (!isConnected) {
    setStatus('⚠️ Conecta el hub primero', 'warn');
    log('⚠️ Debes conectar el hub antes de ejecutar', 'err');
    return;
  }
  if (isRunning) { stopProgram(); return; }

  let code;
  try { code = JS.workspaceToCode(workspace); }
  catch (e) { log('❌ Error generando código: ' + e, 'err'); return; }

  if (!code.trim()) {
    setStatus('⚠️ Añade bloques primero', 'warn');
    log('⚠️ El área de bloques está vacía', 'err');
    return;
  }

  isRunning = true;
  document.getElementById('playBtn').classList.add('running');
  document.getElementById('playBtn').textContent = '⏸';
  setStatus('▶ Ejecutando...', 'ok');
  log('─────────────────────', 'info');
  log('🚀 Programa iniciado', 'ok');

  // FIX: no llamamos motorOff() al terminar naturalmente.
  // El motor queda en su último estado.
  // Solo se para cuando el usuario pulsa ⏹ (stopProgram).
  const program = `(async () => {
    try {
      ${code}
    } catch (e) {
      if (isRunning) log('❌ Error en programa: ' + e.message, 'err');
    } finally {
      isRunning = false;
      document.getElementById('playBtn').classList.remove('running');
      document.getElementById('playBtn').textContent = '▶';
      setStatus('Listo', 'ok');
      log('✅ Programa terminado', 'ok');
    }
  })();`;

  try { eval(program); }
  catch (e) {
    isRunning = false;
    document.getElementById('playBtn').classList.remove('running');
    document.getElementById('playBtn').textContent = '▶';
    log('❌ Error al lanzar: ' + e, 'err');
  }
}

function stopProgram() {
  isRunning = false;
  document.getElementById('playBtn').classList.remove('running');
  document.getElementById('playBtn').textContent = '▶';
  setStatus('Listo', 'ok');
  log('⏹ Parado por el usuario', 'info');
  // Solo aquí paramos el motor (al pulsar el botón de stop)
  motorOff().catch(() => {});
}

// ══════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════

function setStatus(msg, cls) {
  const el = document.getElementById('statusBar');
  el.textContent = msg; el.className = cls || '';
}

function log(msg, cls) {
  const box = document.getElementById('logContent');
  const d   = document.createElement('div');
  d.className = 'e ' + (cls || '');
  const t = new Date().toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  d.textContent = `[${t}] ${msg}`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  while (box.children.length > 150) box.removeChild(box.firstChild);
}

function clearLog() { document.getElementById('logContent').innerHTML = ''; }

// FIX toggle: ahora funciona porque panel y botón son hermanos en flex row
let logVisible = false;

function toggleLog() {
  logVisible = !logVisible;
  const panel = document.getElementById('logPanel');
  const btn   = document.getElementById('logToggleBtn');
  panel.classList.toggle('hidden', !logVisible);
  btn.textContent = logVisible ? '▶' : '◀';
  btn.title       = logVisible ? 'Ocultar registro' : 'Mostrar registro';
  // Redimensionar Blockly después de que termine la transición CSS (250ms)
  setTimeout(() => Blockly.svgResize(workspace), 260);
}
