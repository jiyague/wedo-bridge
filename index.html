<script>
    let motorChar;
    const SERVICE_UUID = '00001523-1212-efde-1523-785feabcd123';

    // ... (Mantén tu código de conexión igual) ...

    async function sendRaw(bytes) {
        if (!motorChar) return;
        try {
            // El Smarthub necesita este formato: [Longitud, HubId, TipoMensaje, Puerto, Comando, Valor]
            // Vamos a intentar un comando de salida directa LWP
            await motorChar.writeValue(new Uint8Array(bytes));
        } catch (e) { document.getElementById('log').innerText = "Error: " + e; }
    }

    document.getElementById('motorCW').onclick = async () => {
        // 1. Inicialización de puerto 1 para motor (Output mode)
        await sendRaw([0x06, 0x00, 0x01, 0x01, 0x02, 0x02]);
        // 2. Comando de encendido al 50%
        await sendRaw([0x06, 0x00, 0x01, 0x01, 0x01, 0x32]);
        document.getElementById('log').innerText = "Comando inicialización + motor enviado";
    };

    document.getElementById('stopBtn').onclick = async () => {
        await sendRaw([0x06, 0x00, 0x01, 0x01, 0x01, 0x00]);
        document.getElementById('log').innerText = "Motor detenido";
    };
</script>
