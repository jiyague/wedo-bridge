<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WeDo Web Control v1.5</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        .btn { padding: 20px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; }
        #log { margin-top: 20px; font-size: 14px; background: #fff; padding: 15px; border: 1px solid #ccc; height: 150px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <h1>WeDo Web Control v1.5 (Pro)</h1>
    <button id="connectBtn" class="btn" style="background:#007bff; color:white;">CONECTAR</button>
    <div id="controls" style="display:none;">
        <button id="motorCW" class="btn" style="background:#ffc107;">GIRAR MOTOR</button>
        <button id="stopBtn" class="btn" style="background:#dc3545; color:white;">PARAR</button>
    </div>
    <div id="log">Esperando conexión...</div>

    <script>
        let motorChar;
        const SERVICE_UUID = '00001523-1212-efde-1523-785feabcd123';

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const chars = await service.getCharacteristics();
                
                motorChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                
                // 1. Handshake inicial: Activar puertos
                await motorChar.writeValue(new Uint8Array([0x06, 0x00, 0x01, 0x01, 0x02, 0x02]));
                
                document.getElementById('controls').style.display = 'block';
                document.getElementById('log').innerText = "Hub inicializado. Listo.";
            } catch (e) { document.getElementById('log').innerText = "Error: " + e; }
        });

        document.getElementById('motorCW').onclick = async () => {
            // Estructura de comando oficial LWP para motor
            // [Longitud, HubId, Tipo, Puerto, Comando, Potencia]
            await motorChar.writeValue(new Uint8Array([0x06, 0x00, 0x01, 0x01, 0x01, 0x32]));
            document.getElementById('log').innerText = "Comando motor enviado.";
        };

        document.getElementById('stopBtn').onclick = async () => {
            await motorChar.writeValue(new Uint8Array([0x06, 0x00, 0x01, 0x01, 0x01, 0x00]));
            document.getElementById('log').innerText = "Comando stop enviado.";
        };
    </script>
</body>
</html>
