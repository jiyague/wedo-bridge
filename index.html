<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WeDo Web Control v1.2</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        .btn { padding: 20px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; }
        #log { margin-top: 20px; font-size: 12px; background: #fff; padding: 10px; border: 1px solid #ccc; height: 150px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <h1>Control WeDo v1.2</h1>
    <button id="connectBtn" class="btn" style="background:#007bff; color:white;">CONECTAR</button>
    <div id="controls" style="display:none;">
        <button id="motorCW" class="btn" style="background:#ffc107;">GIRAR MOTOR</button>
        <button id="stopBtn" class="btn" style="background:#dc3545; color:white;">PARAR</button>
    </div>
    <div id="log">Estado: Esperando...</div>

    <script>
        let motorChar;
        const SERVICE_UUID = '00001523-1212-efde-1523-785feabcd123';

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'LPF2' }, { namePrefix: 'WeDo' }, { namePrefix: '13' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const chars = await service.getCharacteristics();
                motorChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                
                document.getElementById('controls').style.display = 'block';
                document.getElementById('log').innerText = "Conectado. Pulsa 'GIRAR MOTOR'";
            } catch (e) { document.getElementById('log').innerText = "Error: " + e; }
        });

        async function sendRaw(bytes) {
            if (!motorChar) return;
            // Enviamos el comando de escritura
            await motorChar.writeValue(new Uint8Array(bytes));
        }

        document.getElementById('motorCW').onclick = async () => {
            // Estructura de paquete para activar motor en puerto 1 con potencia 50
            // [0x01, 0x01, 0x32] -> Puerto 1, Comando 1, Potencia 50
            await sendRaw([0x01, 0x01, 0x32]);
            document.getElementById('log').innerText = "Comando enviado: Motor ON (Puerto 1)";
        };

        document.getElementById('stopBtn').onclick = async () => {
            await sendRaw([0x01, 0x01, 0x00]);
            document.getElementById('log').innerText = "Comando enviado: Motor OFF";
        };
    </script>
</body>
</html>
