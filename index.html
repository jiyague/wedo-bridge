<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeDo Web Control v1.1 - Autodiscovery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f4f7f6; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .btn { padding: 15px 25px; font-size: 16px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 80%; }
        .btn-connect { background-color: #007bff; color: white; }
        .btn-motor { background-color: #ffc107; }
        .btn-stop { background-color: #dc3545; color: white; }
        #log { margin-top: 20px; font-size: 12px; color: #444; height: 150px; overflow-y: auto; background: #eee; padding: 10px; text-align: left; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>WeDo Web Control v1.1</h1>
    <button id="connectBtn" class="btn btn-connect">CONECTAR Y BUSCAR MOTOR</button>
    
    <div id="controls" style="display:none;">
        <hr>
        <button id="motorCW" class="btn btn-motor">Girar Derecha ↻</button>
        <button id="motorCCW" class="btn btn-motor">Girar Izquierda ↺</button>
        <button id="stopBtn" class="btn btn-stop">PARAR MOTOR</button>
    </div>

    <div id="log">Estado: Esperando...</div>
</div>

<script>
    let device, server, motorChar;
    // UUIDs estándar de LEGO WeDo 2.0
    const SERVICE_UUID = '00001523-1212-efde-1523-785feabcd123';

    const log = (msg) => {
        const d = new Date();
        const line = `[${d.toLocaleTimeString()}] ${msg}`;
        document.getElementById('log').innerHTML = line + "<br>" + document.getElementById('log').innerHTML;
        console.log(line);
    };

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            log("Iniciando búsqueda...");
            device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'LPF2' }, { namePrefix: 'WeDo' }, { namePrefix: '13' }],
                optionalServices: [SERVICE_UUID]
            });
            
            log("Conectando al servidor GATT...");
            server = await device.gatt.connect();
            
            log("Explorando servicio primario...");
            const service = await server.getPrimaryService(SERVICE_UUID);
            
            log("Buscando todas las características disponibles...");
            const characteristics = await service.getCharacteristics();
            
            // Buscamos la característica que permite ESCRITURA (Write)
            motorChar = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

            if (motorChar) {
                log("¡Éxito! Canal encontrado: " + motorChar.uuid);
                document.getElementById('controls').style.display = 'block';
                document.getElementById('connectBtn').style.backgroundColor = '#28a745';
                document.getElementById('connectBtn').innerText = "CONECTADO";
            } else {
                log("Error: No se encontró canal de escritura.");
            }
            
        } catch (e) {
            log("ERROR: " + e);
        }
    });

    async function sendCommand(payload) {
        if (!motorChar) return;
        try {
            // El protocolo WeDo 2.0 para motor directo suele ser: 
            // [Puerto, TipoComando, Valor]
            // Intentamos puerto 1 (0x01) y puerto 2 (0x02) por si acaso
            const data1 = new Uint8Array([0x01, 0x01, payload]);
            const data2 = new Uint8Array([0x02, 0x01, payload]);
            
            await motorChar.writeValue(data1);
            await motorChar.writeValue(data2); 
            log("Comando enviado: " + payload);
        } catch (e) {
            log("Error al enviar: " + e);
        }
    }

    document.getElementById('motorCW').onclick = () => sendCommand(50);
    document.getElementById('motorCCW').onclick = () => sendCommand(200); // 200 es reversa en WeDo
    document.getElementById('stopBtn').onclick = () => sendCommand(0);

</script>
</body>
</html>
