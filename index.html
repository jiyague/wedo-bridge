<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bridge Bluetooth Lego WeDo</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f0f0; }
        button { padding: 20px 40px; font-size: 20px; background-color: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Lego WeDo Bridge</h1>
    <button id="connectBtn">Conectar Smarthub</button>
    <p id="status">Estado: Esperando conexión...</p>

    <script>
        document.getElementById('connectBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            try {
                status.innerText = "Buscando dispositivo...";
                // Buscamos dispositivos LPF2 (el protocolo oficial de WeDo)
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'LPF2' }, { namePrefix: 'WeDo' }],
                    optionalServices: ['00001523-1212-efde-1523-785feabcd123']
                });
                
                status.innerText = "Conectando a " + device.name + "...";
                const server = await device.gatt.connect();
                status.innerText = "¡Conectado! Ya puedes ir a Scratch.";
                
                // Mantenemos la conexión abierta 5 segundos antes de cerrar el puente
                setTimeout(() => {
                    server.disconnect();
                    status.innerText = "Conexión registrada. Abre Scratch ahora.";
                }, 5000);
            } catch (error) {
                status.innerText = "Error: " + error;
            }
        });
    </script>
</body>
</html>
